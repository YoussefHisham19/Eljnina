<!DOCTYPE html>
<html lang="ar" dir="rtl" id="main-html">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>بوابة الطالب - الجنينة</title>
  <script>
    (function() {
      if (localStorage.getItem('user_theme') === 'dark') document.documentElement.classList.add('dark');
    })();
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script>
    tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Cairo', 'system-ui', 'sans-serif'], serif: ['Playfair Display', 'Georgia', 'serif'] } } } }
  </script>
  <style>
    :root { --bg:#faf9f7; --fg:#2d2d2d; --glass:rgba(255,255,255,0.45); --glass-border:rgba(255,255,255,0.6); }
    .dark { --bg:#0f172a; --fg:#f1f5f9; --glass:rgba(15,23,42,0.6); --glass-border:rgba(255,255,255,0.08); }
    body { background-color:var(--bg); color:var(--fg); font-family:'Cairo',sans-serif; min-height:100vh; transition:background-color 0.3s,color 0.3s; }
    .glass-card { background:var(--glass); backdrop-filter:blur(24px); border:1px solid var(--glass-border); border-radius:1.25rem; box-shadow:0 8px 40px rgba(0,0,0,0.1); }
    .glass-nav { background:rgba(255,255,255,0.8); backdrop-filter:blur(20px); border-bottom:1px solid rgba(255,255,255,0.4); }
    .dark .glass-nav { background:rgba(15,23,42,0.8); border-color:rgba(255,255,255,0.08); }
    .animate-float { animation:float 6s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-15px)} }
    .progress-bar { height:8px; border-radius:99px; background:rgba(59,130,246,0.15); overflow:hidden; }
    .progress-fill { height:100%; border-radius:99px; background:linear-gradient(90deg,#3b82f6,#10b981); transition:width 1s ease; }
    #video-container { position:relative; padding-bottom:56.25%; height:0; overflow:hidden; border-radius:1rem; }
    #video-container iframe { position:absolute; top:0; left:0; width:100%; height:100%; border:none; border-radius:1rem; }
    .blocked-screen { background:rgba(239,68,68,0.05); border:2px solid rgba(239,68,68,0.2); border-radius:1.25rem; padding:3rem; text-align:center; }
    .pending-screen { background:rgba(245,158,11,0.05); border:2px solid rgba(245,158,11,0.2); border-radius:1.25rem; padding:3rem; text-align:center; }
  </style>
</head>
<body>

  <!-- Background blobs -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="absolute top-1/4 right-1/4 w-96 h-96 bg-blue-300/10 rounded-full blur-3xl animate-float"></div>
    <div class="absolute bottom-1/4 left-1/4 w-64 h-64 bg-green-300/10 rounded-full blur-3xl animate-float" style="animation-delay:2s"></div>
  </div>

  <!-- NAVBAR -->
  <nav class="glass-nav sticky top-0 z-50 px-6 py-3 flex items-center justify-between">
    <a href="index.html" class="font-serif text-xl font-bold text-blue-600 dark:text-blue-300">الجنينة</a>
    <div class="flex items-center gap-3">
      <span id="student-name" class="text-sm font-medium text-blue-700 dark:text-blue-300"></span>
      <button onclick="toggleTheme()" class="p-2 glass-card hover:scale-110 transition-all">
        <i id="theme-icon" class="fas fa-moon text-blue-600"></i>
      </button>
      <button onclick="handleLogout()" class="text-sm text-red-500 hover:text-red-700 font-medium transition-colors">
        <i class="fas fa-sign-out-alt ml-1"></i>خروج
      </button>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <div class="max-w-4xl mx-auto px-4 py-8" id="main-content">
    <div class="glass-card p-12 text-center">
      <i class="fas fa-spinner fa-spin text-blue-400 text-3xl"></i>
      <p class="text-blue-500 mt-3">جارٍ التحميل...</p>
    </div>
  </div>

  <script>
    // ── CONFIG ────────────────────────────────────────────────
    const SUPABASE_URL = 'https://fpvtcgafpgdvuwtwxunm.supabase.co'
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZwdnRjZ2FmcGdkdnV3dHd4dW5tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NzU0NjgsImV4cCI6MjA5MTM1MTQ2OH0.kJl1KcHmfEGByHQqojYJzAbhmTuo90qnxtDpeKIRNU0' // ← ضع الـ anon key هنا
    const { createClient } = supabase
    const sb = createClient(SUPABASE_URL, SUPABASE_KEY)

    // ── STATE ─────────────────────────────────────────────────
    let currentUser    = null
    let currentLesson  = null
    let currentToken   = null
    let watchInterval  = null
    let secondsWatched = 0

    // ── INIT ──────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', async () => {
      if (localStorage.getItem('user_theme') === 'dark') {
        document.getElementById('theme-icon').className = 'fas fa-sun text-yellow-400'
      }

      const { data: { session } } = await sb.auth.getSession()
      if (!session) {
        // Save intended lesson URL and redirect to auth
        sessionStorage.setItem('redirect_after_auth', window.location.href)
        return window.location.href = 'auth.html'
      }

      currentUser = session.user
      const { data: profile } = await sb.from('profiles').select('*').eq('id', currentUser.id).single()
      if (!profile || profile.role !== 'student') return window.location.href = 'auth.html'

      document.getElementById('student-name').textContent = profile.full_name || ''

      // Check if lesson param exists
      const lessonId = new URLSearchParams(window.location.search).get('lesson')
      if (lessonId) {
        await loadLesson(lessonId, profile)
      } else {
        showNoLesson()
      }
    })

    // ── LOAD LESSON ───────────────────────────────────────────
    async function loadLesson(lessonId, profile) {
      const { data: lesson, error } = await sb.from('lessons').select('*').eq('id', lessonId).single()
      if (error || !lesson) return showError('الحصة غير موجودة')
      currentLesson = lesson

      // Check or create student token
      let { data: token } = await sb
        .from('student_tokens')
        .select('*')
        .eq('lesson_id', lessonId)
        .eq('student_id', currentUser.id)
        .single()

      if (!token) {
        // Create token — student is registered, awaiting teacher approval
        const { data: newToken } = await sb.from('student_tokens').insert({
          lesson_id: lessonId,
          student_id: currentUser.id,
          payment_status: 'unpaid',
          is_locked: false
        }).select().single()
        token = newToken
      }

      currentToken = token

      // Check payment status
      if (token.payment_status !== 'paid') {
        return showPending(lesson, profile)
      }

      // Check device lock
      const userAgent = navigator.userAgent
      const ip = '' // IP checked server-side via Supabase Edge if needed

      if (token.is_locked && token.user_agent && token.user_agent !== userAgent) {
        return showBlocked()
      }

      // Lock token to this device
      if (!token.is_locked) {
        await sb.from('student_tokens').update({
          is_locked: true,
          user_agent: userAgent,
          start_time: new Date().toISOString()
        }).eq('id', token.id)
      }

      // Load existing watch session
      const { data: session_data } = await sb
        .from('watch_sessions')
        .select('*')
        .eq('token_id', token.id)
        .eq('student_id', currentUser.id)
        .single()

      secondsWatched = session_data?.seconds_watched || 0

      showLesson(lesson)
    }

    // ── SHOW LESSON ───────────────────────────────────────────
    function showLesson(lesson) {
      const videoId = extractYouTubeId(lesson.youtube_url)
      const main = document.getElementById('main-content')

      main.innerHTML = `
        <div class="mb-6">
          <h1 class="text-2xl font-bold text-blue-800 dark:text-blue-100 mb-1">${lesson.title}</h1>
          <p class="text-blue-500 dark:text-blue-400">${lesson.description || ''}</p>
        </div>

        <div class="glass-card p-4 mb-6">
          <div id="video-container">
            <iframe src="https://www.youtube.com/embed/${videoId}?enablejsapi=1" 
              allowfullscreen id="yt-player"></iframe>
          </div>
        </div>

        <div class="glass-card p-5">
          <div class="flex items-center justify-between mb-2">
            <span class="text-sm font-medium text-blue-700 dark:text-blue-300">وقت المشاهدة</span>
            <span id="watch-display" class="text-sm font-bold text-blue-600">0 دقيقة</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" id="progress-fill" style="width:0%"></div>
          </div>
          <p class="text-xs text-blue-400 mt-2">نسبة الحضور المطلوبة: ${lesson.attendance_threshold}% من مدة الحصة</p>
        </div>
      `

      startWatchTracking()
    }

    // ── WATCH TRACKING ────────────────────────────────────────
    function startWatchTracking() {
      // Update every 10 seconds
      watchInterval = setInterval(async () => {
        secondsWatched += 10
        updateWatchUI()

        // Upsert to watch_sessions
        await sb.from('watch_sessions').upsert({
          token_id: currentToken.id,
          student_id: currentUser.id,
          lesson_id: currentLesson.id,
          seconds_watched: secondsWatched,
          last_updated: new Date().toISOString()
        }, { onConflict: 'token_id' })
      }, 10000)

      // Also update when page closes
      window.addEventListener('beforeunload', () => {
        clearInterval(watchInterval)
      })
    }

    function updateWatchUI() {
      const mins = Math.floor(secondsWatched / 60)
      const display = document.getElementById('watch-display')
      const fill    = document.getElementById('progress-fill')
      if (display) display.textContent = `${mins} دقيقة`
      // Progress vs threshold (assume 60min lesson default)
      const pct = Math.min(100, (secondsWatched / (currentLesson?.attendance_threshold * 36)) * 100)
      if (fill) fill.style.width = pct + '%'
    }

    // ── SCREENS ───────────────────────────────────────────────
    function showPending(lesson, profile) {
      document.getElementById('main-content').innerHTML = `
        <div class="pending-screen">
          <i class="fas fa-clock text-yellow-500 text-5xl mb-4"></i>
          <h2 class="font-serif text-2xl font-bold text-yellow-700 dark:text-yellow-300 mb-3">في انتظار التأكيد</h2>
          <p class="text-yellow-600 dark:text-yellow-400 mb-2">تم تسجيلك في حصة <strong>${lesson.title}</strong></p>
          <p class="text-sm text-yellow-500">بمجرد تأكيد الدفع من المدرس ستتمكن من الدخول تلقائياً</p>
          <div class="mt-6 glass-card p-4 inline-block text-right">
            <p class="text-xs text-blue-400 mb-1">اسمك المسجل:</p>
            <p class="font-bold text-blue-700 dark:text-blue-300">${profile.full_name}</p>
          </div>
        </div>
      `
    }

    function showBlocked() {
      document.getElementById('main-content').innerHTML = `
        <div class="blocked-screen">
          <i class="fas fa-lock text-red-500 text-5xl mb-4"></i>
          <h2 class="font-serif text-2xl font-bold text-red-700 dark:text-red-300 mb-3">هذا الرابط مفتوح على جهاز آخر</h2>
          <p class="text-red-500">لا يمكن فتح الحصة على أكثر من جهاز في نفس الوقت</p>
          <p class="text-sm text-red-400 mt-2">تواصل مع المدرس إذا كنت تعتقد أن هذا خطأ</p>
        </div>
      `
    }

    function showNoLesson() {
      document.getElementById('main-content').innerHTML = `
        <div class="glass-card p-12 text-center">
          <i class="fas fa-seedling text-blue-300 text-5xl mb-4"></i>
          <h2 class="font-serif text-2xl font-bold text-blue-800 dark:text-blue-100 mb-3">أهلاً بك في الجنينة</h2>
          <p class="text-blue-500">انتظر رابط الحصة من مدرسك</p>
        </div>
      `
    }

    function showError(msg) {
      document.getElementById('main-content').innerHTML = `
        <div class="glass-card p-12 text-center">
          <i class="fas fa-exclamation-triangle text-red-400 text-4xl mb-4"></i>
          <p class="text-red-500">${msg}</p>
        </div>
      `
    }

    // ── UTILS ─────────────────────────────────────────────────
    function extractYouTubeId(url) {
      const match = url.match(/(?:v=|youtu\.be\/)([^&\n?#]+)/)
      return match ? match[1] : ''
    }

    // ── THEME ─────────────────────────────────────────────────
    function toggleTheme() {
      const isDark = document.documentElement.classList.toggle('dark')
      document.getElementById('theme-icon').className = isDark ? 'fas fa-sun text-yellow-400' : 'fas fa-moon text-blue-600'
      localStorage.setItem('user_theme', isDark ? 'dark' : 'light')
    }

    // ── LOGOUT ────────────────────────────────────────────────
    async function handleLogout() {
      clearInterval(watchInterval)
      await sb.auth.signOut()
      window.location.href = 'auth.html'
    }
  </script>
</body>
</html>
